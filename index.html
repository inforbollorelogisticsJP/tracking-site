<script>
const API = "https://tracking-site.onrender.com"; // ✅ FIXED
let loggedIn = false;

// LOGIN
async function login() {
    try {
        const res = await fetch(API + "/admin/login", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                username: document.getElementById("adminUser").value,
                password: document.getElementById("adminPass").value
            })
        });

        if (res.ok) {
            loggedIn = true;
            alert("Admin logged in ✅");
        } else {
            alert("Invalid login ❌");
        }
    } catch (err) {
        alert("Server error");
    }
}

// GENERATE TRACKING
async function generateTracking() {
    if (!loggedIn) {
        alert("Login first");
        return;
    }

    try {
        const res = await fetch(API + "/create", { method: "POST" });
        const data = await res.json();

        document.getElementById("generatedCode").innerText =
            "Tracking Number: " + data.code;
    } catch (err) {
        alert("Error generating tracking");
    }
}

// TRACK SHIPMENT
async function startTracking() {
    const code = document.getElementById("trackInput").value;

    if (!code) {
        alert("Enter tracking number");
        return;
    }

    try {
        const res = await fetch(API + "/track/" + code);

        if (!res.ok) {
            alert("Tracking code not found ❌");
            return;
        }

        const data = await res.json();

        // update progress
        document.getElementById("progressBar").style.width =
            data.progress + "%";

        // show steps gradually
        let steps = ["s1","s2","s3","s4","s5"];

        steps.forEach((id, i) => {
            setTimeout(() => {
                document.getElementById(id).classList.add("show");
            }, i * 500);
        });

    } catch (err) {
        alert("Server error");
    }
}
</script>
